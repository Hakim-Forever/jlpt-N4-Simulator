<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JLPT N4 Simulator | 100 Soal Lengkap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { animation: { fadeIn: 'fadeIn 0.3s ease-out' }, keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } } } }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
        .dark ::-webkit-scrollbar-track { background: #374151; }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100 dark:from-gray-900 dark:to-gray-800 transition-colors duration-300">
    <div id="root"></div>
    
    <!-- Load Data Questions -->
    <script src="js/questions-part-2.js"></script>
    <script src="js/questions-part-3.js"></script>
    <script src="js/questions-part-4.js"></script>
    <script src="js/questions-part-5.js"></script>
    <script src="js/questions-part-6.js"></script>
    
    <!-- Load Quiz Engine & UI Components -->
    <script src="js/quiz-engine.js"></script>
    <script src="js/ui-components.js"></script>
    
    <!-- Load Final App -->
    <script src="js/app.js"></script>
</body>
</html>
